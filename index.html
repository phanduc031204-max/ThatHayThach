<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truth or Dare - Vui Nhộn Cho Cặp Đôi</title>
    <style>
        :root {
            --bg-color: #0d0e15;
            --card-bg: #161925;
            --text-color: #f0f2f5;
            --truth-color: #00f0ff;
            --truth-glow: rgba(0, 240, 255, 0.4);
            --dare-color: #ff007f;
            --dare-glow: rgba(255, 0, 127, 0.4);
            --neutral-glow: rgba(157, 0, 255, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 240, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 127, 0.05) 0%, transparent 40%);
        }

        .container {
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(45deg, var(--truth-color), var(--dare-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 8px rgba(255,255,255,0.1));
        }

        .subtitle {
            font-size: 0.95rem;
            color: #8a8f98;
            margin-bottom: 30px;
        }

        .game-card {
            background-color: var(--card-bg);
            border: 2px solid #23283d;
            border-radius: 20px;
            padding: 40px 25px;
            min-height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 30px;
        }

        .game-card.truth-active {
            border-color: var(--truth-color);
            box-shadow: 0 0 25px var(--truth-glow);
        }

        .game-card.dare-active {
            border-color: var(--dare-color);
            box-shadow: 0 0 25px var(--dare-glow);
        }

        .badge {
            position: absolute;
            top: -12px;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: none;
        }

        .truth-active .badge {
            display: block;
            background-color: var(--truth-color);
            color: #000;
            box-shadow: 0 0 10px var(--truth-color);
        }

        .dare-active .badge {
            display: block;
            background-color: var(--dare-color);
            color: #fff;
            box-shadow: 0 0 10px var(--dare-color);
        }

        .question-text {
            font-size: 1.25rem;
            line-height: 1.6;
            font-weight: 500;
            transition: opacity 0.3s ease;
        }

        .placeholder-text {
            color: #535c68;
            font-style: italic;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
            margin-bottom: 25px;
        }

        button {
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: transform 0.1s, box-shadow 0.3s;
            flex: 1;
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-truth {
            background: transparent;
            color: var(--truth-color);
            border: 2px solid var(--truth-color);
            box-shadow: inset 0 0 5px var(--truth-glow);
        }

        .btn-truth:hover {
            background: var(--truth-color);
            color: #000;
            box-shadow: 0 0 20px var(--truth-color);
        }

        .btn-dare {
            background: transparent;
            color: var(--dare-color);
            border: 2px solid var(--dare-color);
            box-shadow: inset 0 0 5px var(--dare-glow);
        }

        .btn-dare:hover {
            background: var(--dare-color);
            color: #fff;
            box-shadow: 0 0 20px var(--dare-color);
        }

        .stats-panel {
            display: flex;
            justify-content: space-around;
            background: rgba(22, 25, 37, 0.6);
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            color: #a4b0be;
            border: 1px solid #1f2438;
            margin-bottom: 25px;
        }

        .stat-item span {
            font-weight: bold;
            color: #fff;
        }

        .history-box {
            text-align: left;
            background: rgba(10, 11, 18, 0.8);
            border-radius: 12px;
            padding: 15px;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #1a1e30;
        }

        .history-box h3 {
            font-size: 0.9rem;
            color: #5f27cd;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .history-item {
            font-size: 0.85rem;
            padding: 6px 0;
            border-bottom: 1px solid #161925;
            color: #ced6e0;
        }
        
        .history-item:last-child {
            border-bottom: none;
        }

        .history-item .tag-t { color: var(--truth-color); font-weight: bold; }
        .history-item .tag-d { color: var(--dare-color); font-weight: bold; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0d0e15;
        }
        ::-webkit-scrollbar-thumb {
            background: #23283d;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #343c5e;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Truth or Dare</h1>
        <div class="subtitle">Trò chơi Thật hay Thách lãng mạn & hài hước cho cặp đôi</div>

        <div class="game-card" id="card">
            <div class="badge" id="card-badge">Thật</div>
            <div class="question-text placeholder-text" id="question-text">
                Bấm một nút bên dưới để bắt đầu thử thách thử lòng nhau...
            </div>
        </div>

        <div class="btn-group">
            <button class="btn-truth" onclick="getNewQuestion('truth')">THẬT</button>
            <button class="btn-dare" onclick="getNewQuestion('dare')">THÁCH</button>
        </div>

        <div class="stats-panel">
            <div class="stat-item">Đã chơi: <span id="count-total">0</span></div>
            <div class="stat-item">Thật: <span id="count-truth">0</span></div>
            <div class="stat-item">Thách: <span id="count-dare">0</span></div>
        </div>

        <div class="history-box">
            <h3>Lịch sử lượt chơi</h3>
            <div id="history-list">
                <div class="history-item" style="color: #57606f; font-style: italic;">Chưa có câu hỏi nào được chọn</div>
            </div>
        </div>
    </div>

    <script>
        const truths = ["Ấn tượng đầu tiên của bạn về đối phương là gì? Lúc đó trông có 'ngố' không?", "Tật xấu nào của đối phương khiến bạn vừa bực vừa thấy đáng yêu nhất?", "Điểm nào trên khuôn mặt hoặc cơ thể của đối phương làm bạn mê mẩn nhất?", "Bạn đã bao giờ nói dối đối phương một điều gì đó (dù là vô hại) chưa? Đó là gì?", "Nếu được thay đổi một thói quen duy nhất của người kia, bạn sẽ chọn thay đổi điều gì?", "Câu nói ngọt ngào hoặc cảm động nhất mà người kia từng nói khiến bạn nhớ mãi là gì?", "Món ăn 'kinh dị' nhất hoặc trải nghiệm ăn uống bất ổn nhất mà hai đứa từng thử cùng nhau?", "Bộ phim nào xem chung khiến bạn thấy chán ngủ gục nhưng vẫn cố thức vì người kia?", "Bạn thích được đối phương ôm từ phía sau, xoa đầu hay nắm tay đi dạo hơn?", "Nếu bỗng nhiên trúng số 10 tỷ, việc đầu tiên bạn muốn thực hiện cùng đối phương là gì?", "Trong tất cả các chuyến đi chơi hoặc hẹn hò, khoảnh khắc nào làm bạn rung động mạnh nhất?", "Nếu được quyền 'hack' vào điện thoại của đối phương trong 1 phút, bạn sẽ mở app nào đầu tiên?", "Lần gần đây nhất bạn ghen là vì chuyện gì? Lúc đó trong đầu đang suy nghĩ gì?", "Một điều bạn rất muốn cả hai cùng làm trong tương lai nhưng chưa có cơ hội nói ra?", "Lúc bực mình người kia nhất, bạn đã từng nghĩ ra 'âm mưu' gì để trả đũa chưa?", "Ba từ chính xác nhất để miêu tả về mối quan hệ của hai bạn ở thời điểm hiện tại?", "Tính cách của đối phương làm bạn liên tưởng đến loài động vật đáng yêu nào nhất?", "Nếu đối phương là một món ăn ăn hằng ngày, bạn nghĩ người đó sẽ là món gì?", "Bạn thích đối phương mặc quần áo màu gì hoặc theo phong cách nào nhất?", "Nếu tự chấm điểm độ 'chiều chuộng' của người kia dành cho bạn từ 1 đến 10, bạn cho mấy điểm?", "Tin nhắn ngọt ngào nhất của người kia mà bạn vẫn còn lưu hoặc chụp màn hình lại là gì?", "Bạn có bao giờ âm thầm vào trang cá nhân của đối phương để xem lén lịch sử hay bình luận không?", "Định nghĩa của bạn về một tình yêu lâu dài và lý tưởng là như thế nào?", "Kiểu tóc hoặc layout nào của đối phương làm bạn thấy thu hút và 'bánh cuốn' nhất?", "Nếu được hoán đổi thân xác cho nhau trong vòng 1 ngày, việc đầu tiên bạn sẽ làm là gì?", "Trong hai đứa, bạn nghĩ ai là người hay 'dỗi' nhiều hơn và ai luôn là người xuống nước trước?", "Cảm giác của bạn trong lần đầu tiên hai đứa nắm tay nhau đi bên nhau như thế nào?", "Món quà ý nghĩa nhất (không tính giá trị vật chất) mà đối phương từng tự tay làm hoặc tặng bạn?", "Bạn có tin vào duyên số hay cung hoàng đạo hợp nhau không? Bạn thấy hai đứa hợp nhau ở điểm nào nhất?", "Sợ nhất điều gì mỗi khi hai người xảy ra tranh cãi hoặc chiến tranh lạnh?", "Thói quen ăn uống dị biệt hoặc sở thích ăn uống kỳ lạ nào của đối phương mà bạn phát hiện ra?", "Ai là người chủ động nhắn tin, bắt chuyện hoặc thả thính trước trong mối quan hệ này?", "Bạn đã bao giờ ngủ mơ thấy đối phương chưa? Giấc mơ kỳ lạ hoặc đáng nhớ nhất đó là gì?", "Kiểu ôm nào làm bạn cảm thấy an toàn, ấm áp và trút bỏ hết mọi áp lực mệt mỏi nhất?", "Trận cãi nhau vô tri, ngớ ngẩn nhất mà hai đứa từng trải qua là về chủ đề gì?", "Tự chấm điểm độ chung thủy và nghiêm túc của bản thân trong mối quan hệ này trên thang điểm 10?", "Nếu đối phương vô tình làm hỏng hoặc mất một món đồ bạn cực kỳ yêu thích, bạn sẽ phản ứng ra sao?", "Bạn thích đối phương gọi mình bằng biệt danh gì nhất hằng ngày?", "Bài hát nào dạo gần đây mỗi lần vang lên đều làm bạn nghĩ ngay đến đối phương?", "Điều gì ở đối phương khiến bạn cảm thấy tự hào nhất khi kể với bạn bè hoặc gia đình?", "Khi bạn buồn hoặc gặp áp lực, hành động nào của người kia sẽ giúp bạn sạc lại năng lượng nhanh nhất?", "Bạn có bao giờ giữ một bí mật nhỏ nào mà đến tận bây giờ vẫn chưa dám khai báo không?", "Nếu có một ngày để cả hai hoàn toàn rời xa điện thoại và mạng xã hội, bạn muốn cùng làm gì?", "Sở thích chung nào của hai đứa mà bạn cảm thấy vui vẻ nhất khi tận hưởng cùng nhau?", "Đánh giá độ 'nhạt' hoặc độ khiếu hài hước của đối phương xem có cùng tần số với bạn không?", "Trí nhớ của bạn thế nào? Hãy kể lại chín         const dares = ["Đăng ngay một câu Note trên Messenger khen đối phương bằng một câu chơi chữ tự nghĩ ra và giữ trong 24h.", "Đổi biệt danh của đối phương trên Messenger thành một cái tên siêu sến súa và giữ ít nhất trong 3 ngày.", "Hít đất hoặc Plank trong vòng 20 giây, trong lúc làm phải hát vang một bài nhạc thiếu nhi.", "Cho đối phương toàn quyền kiểm tra lịch sử tìm kiếm gần nhất trên YouTube hoặc Google của bạn.", "Nhắm mắt lại và để đối phương dùng son môi vẽ một hình nhỏ (trái tim, ngôi sao...) lên má của bạn.", "Gọi điện cho một người bạn thân, nói một câu cực kỳ vô tri rồi cúp máy ngay lập tức không giải thích.", "Thử nói bằng giọng của một vùng miền khác (hoặc giọng hoạt hình) trong suốt 3 lượt chơi tiếp theo.", "Massage vai, cổ hoặc tay cho đối phương trong vòng 2 phút thật nghiêm túc.", "Mở danh sách tin nhắn và đọc to tin nhắn gần đây nhất mà bạn gửi cho bố hoặc mẹ.", "Thể hiện lại biểu cảm gương mặt của bạn khi đang ghen một cách phóng đại và hài hước nhất.", "Nhìn thẳng vào mắt đối phương trong vòng 30 giây liên tục mà không được chớp mắt hay bật cười.", "Nhắm mắt lại, để đối phương đút cho ăn một món có sẵn trong tủ lạnh và đoán xem đó là món gì.", "Hát một đoạn của một bài hát tình ca lãng mạn bằng chất giọng của vịt Donald hoặc robot.", "Cho đối phương xem bức ảnh dìm hàng dại dột nhất hoặc ảnh cũ ngày xưa trong thư viện ảnh của bạn.", "Để đối phương cù lét trong vòng 10 giây và bạn không được phép cử động hay chạy trốn.", "Nói câu 'Anh yêu em' hoặc 'Em yêu anh' bằng 3 ngôn ngữ khác nhau thật truyền cảm.", "Đăng một tấm ảnh dìm nhẹ của bản thân hoặc ảnh chụp chung của hai đứa lên story kèm một caption ngọt ngào.", "Thả tim (hoặc thương thương) liên tiếp vào 5 bài viết gần nhất của đối phương trên mạng xã hội.", "Gửi một icon hoặc sticker ngớ ngẩn nhất cho một người bất kỳ đang online trong danh sách bạn bè.", "Để đối phương tự chọn 1 bài hát bất kỳ và bạn buộc phải chia sẻ bài đó lên Note Messenger của mình.", "Đọc to status hoặc bình luận g         let playedTruths = [];
        let playedDares = [];
        
        let stats = {
            total: 0,
            truth: 0,
            dare: 0
        };

        function getNewQuestion(type) {
            const card = document.getElementById('card');
            const badge = document.getElementById('card-badge');
            const textEl = document.getElementById('question-text');
            
            // Fade out text effect
            textEl.style.opacity = 0;
            
            setTimeout(() => {
                let selectedQuestion = "";
                let pool = type === 'truth' ? truths : dares;
                let playedPool = type === 'truth' ? playedTruths : playedDares;

                // Reset pool if all questions are used
                if (playedPool.length === pool.length) {
                    playedPool.length = 0; 
                }

                // Pick a question that hasn't been played in the current cycle
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * pool.length);
                } while (playedPool.includes(randomIndex) && pool.length > 1);

                playedPool.push(randomIndex);
                selectedQuestion = pool[randomIndex];

                // Update UI styles
                if (type === 'truth') {
                    card.className = "game-card truth-active";
                    badge.innerText = "THẬT";
                    stats.truth++;
                } else {
                    card.className = "game-card dare-active";
                    badge.innerText = "THÁCH";
                    stats.dare++;
                }
                
                stats.total++;
                
                // Update text and fade back in
                textEl.className = "question-text";
                textEl.innerText = selectedQuestion;
                textEl.style.opacity = 1;

                // Update statistics dashboard
                document.getElementById('count-total').innerText = stats.total;
                document.getElementById('count-truth').innerText = stats.truth;
                document.getElementById('count-dare').innerText = stats.dare;

                // Update history log
                updateHistory(type, selectedQuestion);

            }, 200);
        }

        function updateHistory(type, text) {
            const historyList = document.getElementById('history-list');
            
            // Remove placeholder if it's the first question
            if (stats.total === 1) {
                historyList.innerHTML = "";
            }

            const item = document.createElement('div');
            item.className = "history-item";
            
            const typeTag = type === 'truth' 
                ? '<span class="tag-t">[THẬT]</span>' 
                : '<span class="tag-d">[THÁCH]</span>';
                
            item.innerHTML = `${typeTag} ${text}`;
            
            // Prepend to show newest first
            historyList.insertBefore(item, historyList.firstChild);
        }
    </script>
